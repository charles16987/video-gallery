<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Video Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg-dark:#0f172a;
--card-bg:#1e293b;
--accent:#3b82f6;
--text-primary:#f8fafc;
--text-secondary:#94a3b8;
}

body{
background:var(--bg-dark);
color:var(--text-primary);
font-family:'Inter',sans-serif;
}

.nav-tabs{
border-bottom:none;
justify-content:center;
margin-bottom:3rem;
}

.nav-tabs .nav-link{
color:var(--text-secondary);
border:none;
padding:.75rem 1.5rem;
font-weight:600;
border-radius:50px;
margin:0 .5rem;
}

.nav-tabs .nav-link.active{
background:var(--accent);
color:#fff;
}

.video-card{
background:var(--card-bg);
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.video-card:hover{
transform:translateY(-5px);
}

.thumbnail-wrapper{
position:relative;
width:100%;
background:#000;
}

.ratio-16-9{aspect-ratio:16/9;}
.ratio-9-16{aspect-ratio:9/16;}

.video-card video{
width:100%;
height:100%;
object-fit:cover;
}

.play-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.3);
opacity:0;
transition:.3s;
}

.video-card:hover .play-overlay{opacity:1;}

.play-icon{
width:50px;
height:50px;
background:#000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.video-info{
padding:1rem;
}

.video-title{
font-size:1rem;
font-weight:600;
}

.video-meta{
font-size:.8rem;
color:var(--text-secondary);
}

.vertical-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:1.5rem;
}

@media(max-width:576px){
.vertical-grid{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-5">Video Gallery</h1>

<ul class="nav nav-tabs">

<li class="nav-item">
<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#horizontal">
Horizontal
</button>
</li>

<li class="nav-item">
<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#vertical">
Vertical
</button>
</li>

</ul>

<div class="tab-content">

<div class="tab-pane fade show active" id="horizontal">
<div class="row g-4" id="horizontalGrid"></div>
</div>

<div class="tab-pane fade" id="vertical">
<div class="vertical-grid" id="verticalGrid"></div>
</div>

</div>

</div>

<div class="modal fade" id="videoModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark">

<div class="modal-header">
<h5 class="modal-title" id="modalTitle"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body p-0">
<video id="modalVideo" controls style="width:100%"></video>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const videos=[
{
id:1,
title:"Real Estate",
type:"horizontal",
url:"video/Horizontal-1.mp4",
meta:"4K"
},
{
id:2,
title:"Real Estate",
type:"horizontal",
url:"video/Horizontal-2.mp4",
meta:"4K"
},
{
id:3,
title:"Real Estate",
type:"horizontal",
url:"video/Horizontal-3.mp4",
meta:"4K"
},
{
id:4,
title:"Real Estate",
type:"vertical",
url:"video/vertical-1.mp4",
meta:"Portrait"
},
{
id:5,
title:"Real Estate",
type:"vertical",
url:"video/vertical-2.mp4",
meta:"Portrait"
},{
id:6,
title:"Real Estate",
type:"vertical",
url:"video/vertical-3.mp4",
meta:"Portrait"
}
];

const horizontalGrid=document.getElementById("horizontalGrid");
const verticalGrid=document.getElementById("verticalGrid");

const modalVideo=document.getElementById("modalVideo");
const modalTitle=document.getElementById("modalTitle");
const videoModal=new bootstrap.Modal(document.getElementById("videoModal"));

function createVideoCard(video){

const isVertical=video.type==="vertical";

const col=document.createElement("div");

if(!isVertical){
col.className="col-12 col-sm-6 col-lg-4 col-xl-3";
}

col.innerHTML=`

<div class="video-card" onclick="openVideo(${video.id})">

<div class="thumbnail-wrapper ${isVertical?'ratio-9-16':'ratio-16-9'}">

<video muted loop preload="metadata"
onmouseover="this.play()"
onmouseout="this.pause();this.currentTime=0;">

<source src="${video.url}" type="video/mp4">

</video>

<div class="play-overlay">
<div class="play-icon">▶</div>
</div>

</div>

<div class="video-info">

<div class="video-title">${video.title}</div>
<div class="video-meta">${video.meta}</div>

</div>

</div>

`;

return col;
}

videos.forEach(video=>{

if(video.type==="horizontal"){
horizontalGrid.appendChild(createVideoCard(video));
}else{
verticalGrid.appendChild(createVideoCard(video));
}

});

window.openVideo=function(id){

const video=videos.find(v=>v.id===id);

modalTitle.innerText=video.title;

modalVideo.src=video.url;

videoModal.show();

};

</script>

</body>
</html>
